name: Coverage

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the Cargo workspace
        type: string
        default: "."
      codecov-flags:
        description: Flags for Codecov upload (e.g. crypto, core)
        type: string
        default: ""
    secrets:
      CODECOV_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  coverage:
    name: Code Coverage (llvm-cov)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cov-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Generate coverage (lcov)
        run: |
          cargo llvm-cov nextest \
            --all-features \
            --workspace \
            --lcov \
            --output-path lcov.info
        env:
          CARGO_TARGET_DIR: /tmp/cargo-target

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ inputs.working-directory }}/lcov.info
          flags: ${{ inputs.codecov-flags }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
